<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Dashboard</title>
  <meta http-equiv="refresh" content="0;url=src/dashboard/index.html">
  <script>
    const destination = 'src/dashboard/index.html' + window.location.search + window.location.hash;
    window.location.replace(destination);
  </script>
 </head>
 <body>
   <p>Redirecting to the dashboard... <a id="dashboardLink" href="src/dashboard/index.html">Click here if not redirected.</a></p>
   <script>
     document.getElementById('dashboardLink').href = 'src/dashboard/index.html' + window.location.search + window.location.hash;
   </script>
</html>
