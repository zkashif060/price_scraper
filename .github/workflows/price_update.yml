name: eBay Price Updater

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python src/ebay_price_updater.py
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          LIBSQL_URL:         ${{ secrets.LIBSQL_URL }}
          LIBSQL_AUTH_TOKEN:  ${{ secrets.LIBSQL_AUTH_TOKEN }}