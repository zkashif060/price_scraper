name: Amazon Price Scraper

on:
  schedule:
    # Run every 4 hours: at minute 0 of 0,4,8,12,16,20
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no ASINs are due'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Order Monitor (check for new orders)
        env:
          LIBSQL_URL: ${{ secrets.LIBSQL_URL }}
          LIBSQL_AUTH_TOKEN: ${{ secrets.LIBSQL_AUTH_TOKEN }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          cd src
          python ebay_order_monitor.py

      - name: Run Amazon Scraper
        env:
          LIBSQL_URL: ${{ secrets.LIBSQL_URL }}
          LIBSQL_AUTH_TOKEN: ${{ secrets.LIBSQL_AUTH_TOKEN }}
        run: |
          cd src
          python amazon_scraper.py

      - name: Run eBay Price Updater (if prices changed)
        env:
          LIBSQL_URL: ${{ secrets.LIBSQL_URL }}
          LIBSQL_AUTH_TOKEN: ${{ secrets.LIBSQL_AUTH_TOKEN }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          cd src
          python ebay_price_updater.py